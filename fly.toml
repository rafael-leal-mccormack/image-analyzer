app = "simple-analyzer"
primary_region = "iad"

[build]

[deploy]
  strategy = "bluegreen"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  MAX_FILE_SIZE_MB = "10"
  BAG_CONFIDENCE_THRESHOLD = "0.4"
  RECEIPT_CONFIDENCE_THRESHOLD = "0.4"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-4x"
  memory = "1gb"
